<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishSim Injector</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--bg2:#0c1220;--bg3:#10182a;--border:#1a2744;
  --text:#b8c9dd;--text2:#6b7f99;--text3:#3d4f66;
  --red:#ff4757;--orange:#ffa502;--green:#2ed573;--blue:#4da6ff;--cyan:#00d2d3;
  --font-mono:'JetBrains Mono',monospace;--font-ui:'Space Grotesk',sans-serif;
  --header-h:52px;--action-h:48px;
}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,button{font-family:inherit}
input[type="checkbox"]{accent-color:var(--red)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const API = window.location.origin;

const SCENARIO_META = {
  "1":{icon:"\u{1F3A3}",color:"#ff4757",indicators:["SPF=fail","DKIM=none","DMARC=fail","Typosquat domain","PHPMailer","Russian IP"]},
  "2":{icon:"\u{1F454}",color:"#ffa502",indicators:["From/Reply-To mismatch","Cousin domain","Wire transfer","Urgency","SPF=pass"]},
  "3":{icon:"\u{1F4CE}",color:"#ff4757",indicators:["PHPMailer","Russian IP","Macro-enabled doc","SPF=softfail","Financial urgency"]},
  "4":{icon:"\u{1F517}",color:"#ff4757",indicators:["Subdomain abuse URL","SPF=fail","SCL=9","Geo-anomaly","Spoofed brand"]},
  "5":{icon:"\u2705",color:"#2ed573",indicators:["SPF=pass","DKIM=pass","DMARC=pass","SCL=-1","Internal sender","Normal content"]},
};

const VERDICT_COLORS = {MALICIOUS:"#ff4757",SUSPICIOUS:"#ffa502",BENIGN:"#2ed573"};

function Badge({children,color}){
  return <span style={{display:"inline-block",padding:"2px 10px",borderRadius:4,fontSize:11,fontWeight:700,letterSpacing:.5,background:color+"18",color,border:"1px solid "+color+"40"}}>{children}</span>;
}

function getApiKey(){
  return localStorage.getItem("phishsim_api_key")||"";
}

async function api(path,opts={}){
  const hdrs={"Content-Type":"application/json"};
  const key=getApiKey();
  if(key) hdrs["X-API-Key"]=key;
  const r = await fetch(API+path,{...opts,headers:{...hdrs,...(opts.headers||{})}});
  if(r.status===401) throw new Error("Unauthorized — check API key in Settings");
  return r.json();
}

function App(){
  const [scenarios,setScenarios]=useState([]);
  const [users,setUsers]=useState([]);
  const [selectedScenarios,setSelectedScenarios]=useState(new Set(["1","2","3","4","5"]));
  const [selectedUsers,setSelectedUsers]=useState(new Set());
  const [config,setConfig]=useState({});
  const [authStatus,setAuthStatus]=useState(null);
  const [orgName,setOrgName]=useState("");
  const [logs,setLogs]=useState([]);
  const [running,setRunning]=useState(false);
  const [statusData,setStatusData]=useState(null);
  const [connecting,setConnecting]=useState(true);
  const [expandedScenario,setExpandedScenario]=useState(null);
  const [userSearch,setUserSearch]=useState("");
  const [logOpen,setLogOpen]=useState(false);
  const [bottomTab,setBottomTab]=useState("log");
  const [showSettings,setShowSettings]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("phishsim_api_key")||"");
  const logEndRef=useRef(null);

  const log=useCallback((type,msg)=>{
    setLogs(p=>[...p,{type,msg,ts:new Date().toLocaleTimeString()}]);
    setLogOpen(true);
    setBottomTab("log");
  },[]);

  const testAuth=async()=>{
    log("info","Testing authentication...");
    try{
      const d=await api("/api/auth/test",{method:"POST"});
      if(d.ok){setAuthStatus("ok");setOrgName(d.org_name||"");log("success","Connected to: "+d.org_name+(d.domains?.length?" ("+d.domains.join(", ")+")":""));}
      else{setAuthStatus("fail");log("error","Auth failed: "+(d.error||"unknown"));}
    }catch(e){setAuthStatus("fail");log("error","Auth error: "+e.message);}
  };

  const loadUsers=async()=>{
    log("info","Fetching tenant users...");
    try{
      const d=await api("/api/users");
      const u=d.users||[];
      setUsers(u);
      log("success",`Found ${u.length} users with mailboxes`);
    }catch(e){log("error","Failed to load users: "+e.message);}
  };

  const connectAndLoad=async()=>{
    setConnecting(true);
    await testAuth();
    await loadUsers();
    setConnecting(false);
  };

  // Auto-connect on mount
  useEffect(()=>{
    api("/api/config").then(d=>setConfig(d));
    api("/api/scenarios").then(d=>setScenarios(d.scenarios||[]));
    connectAndLoad();
  },[]);

  useEffect(()=>{
    if(logEndRef.current) logEndRef.current.scrollIntoView({behavior:"smooth"});
  },[logs]);

  const getTargets=()=>users.filter(u=>selectedUsers.has(u.mail||u.userPrincipalName)).map(u=>u.mail||u.userPrincipalName);

  const runInject=async()=>{
    const targets=getTargets();
    if(!targets.length){log("error","No users selected");return;}
    if(!selectedScenarios.size){log("error","No scenarios selected");return;}
    setRunning(true);
    log("info",`Injecting ${selectedScenarios.size} scenarios \u2192 ${targets.length} users (${selectedScenarios.size*targets.length} emails)`);
    try{
      const d=await api("/api/inject",{method:"POST",body:JSON.stringify({scenario_ids:[...selectedScenarios],targets,config})});
      for(const r of (d.results||[])){
        if(r.ok) log("success",`\u2713 [${r.scenario_id}] ${r.scenario_name} \u2192 ${r.target}`);
        else log("error",`\u2717 [${r.scenario_id}] ${r.scenario_name} \u2192 ${r.target}: ${r.detail}`);
      }
      log("info",`\u2501\u2501 Complete: ${d.injected} injected, ${d.failed} failed (Run: ${d.run_id}) \u2501\u2501`);
    }catch(e){log("error","Inject failed: "+e.message);}
    setRunning(false);
  };

  const runClean=async()=>{
    const targets=getTargets();
    if(!targets.length){log("error","No users selected");return;}
    setRunning(true);
    log("info","Cleaning simulation emails...");
    try{
      const d=await api("/api/clean",{method:"POST",body:JSON.stringify({scenario_ids:[...selectedScenarios],targets})});
      log("success",`Cleaned ${d.cleaned} messages`);
    }catch(e){log("error","Clean failed: "+e.message);}
    setRunning(false);
  };

  const runReset=async()=>{
    const targets=getTargets();
    if(!targets.length){log("error","No users selected");return;}
    setRunning(true);
    log("info","\u2550\u2550\u2550 FULL RESET \u2550\u2550\u2550");
    try{
      const d=await api("/api/reset",{method:"POST",body:JSON.stringify({scenario_ids:[...selectedScenarios],targets})});
      log("success",`Cleaned ${d.cleaned} old messages, injected ${d.injected} fresh (Run: ${d.run_id})`);
    }catch(e){log("error","Reset failed: "+e.message);}
    setRunning(false);
  };

  const runStatus=async()=>{
    const targets=getTargets();
    if(!targets.length){log("error","No users selected");return;}
    setRunning(true);
    log("info","Scanning mailboxes...");
    try{
      const d=await api("/api/status",{method:"POST",body:JSON.stringify({targets})});
      setStatusData(d.status||{});
      const total=Object.values(d.status||{}).reduce((a,b)=>a+b.length,0);
      log("success",`Found ${total} simulation emails across ${targets.length} mailboxes`);
      setBottomTab("status");
      setLogOpen(true);
    }catch(e){log("error","Status check failed: "+e.message);}
    setRunning(false);
  };

  const toggleAllUsers=()=>{
    const filtered=filteredUsers();
    const allSelected=filtered.every(u=>selectedUsers.has(u.mail||u.userPrincipalName));
    const next=new Set(selectedUsers);
    filtered.forEach(u=>{const k=u.mail||u.userPrincipalName; allSelected?next.delete(k):next.add(k);});
    setSelectedUsers(next);
  };

  const filteredUsers=()=>{
    if(!userSearch) return users;
    const q=userSearch.toLowerCase();
    return users.filter(u=>(u.displayName||"").toLowerCase().includes(q)||(u.mail||"").toLowerCase().includes(q)||(u.department||"").toLowerCase().includes(q));
  };

  const logH = logOpen ? 292 : 42;

  // ── Render ────────────────────────────────────
  return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)"}}>

    {/* ── Header ── */}
    <div style={{height:"var(--header-h)",flexShrink:0,background:"linear-gradient(135deg,#0a101e,#101830)",borderBottom:"1px solid var(--border)",padding:"0 28px",display:"flex",alignItems:"center",gap:16}}>
      <div style={{fontSize:28}}>{"\u{1F3A3}"}</div>
      <div>
        <div style={{fontSize:17,fontWeight:800,color:"var(--red)",letterSpacing:2,fontFamily:"var(--font-mono)"}}>PHISHSIM INJECTOR</div>
        <div style={{fontSize:11,color:"var(--text3)",letterSpacing:1}}>PHISHING SIMULATION TOOLKIT</div>
      </div>
      <div style={{flex:1}}/>
      {authStatus==="ok"&&orgName&&<span style={{fontSize:12,color:"var(--text2)",padding:"4px 12px",background:"var(--bg2)",borderRadius:4,border:"1px solid var(--border)"}}>{orgName}</span>}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:6,
        background:authStatus==="ok"?"rgba(46,213,115,0.08)":authStatus==="fail"?"rgba(255,71,87,0.08)":"rgba(85,102,119,0.06)",
        border:"1px solid "+(authStatus==="ok"?"#2ed57330":authStatus==="fail"?"#ff475730":"#33445520")}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:authStatus==="ok"?"var(--green)":authStatus==="fail"?"var(--red)":"var(--text3)",
          boxShadow:authStatus==="ok"?"0 0 8px #2ed57360":authStatus==="fail"?"0 0 8px #ff475760":"none"}}/>
        <span style={{fontSize:11,fontFamily:"var(--font-mono)",fontWeight:600,
          color:authStatus==="ok"?"var(--green)":authStatus==="fail"?"var(--red)":"var(--text3)"}}>
          {authStatus==="ok"?"CONNECTED":authStatus==="fail"?"AUTH FAILED":connecting?"CONNECTING...":"NOT CONNECTED"}
        </span>
      </div>
      <button onClick={()=>setShowSettings(true)}
        style={{background:"none",border:"1px solid var(--border)",borderRadius:6,
          padding:"6px 10px",cursor:"pointer",fontSize:16,color:"var(--text3)"}}>
        {"\u2699\uFE0F"}
      </button>
    </div>

    {/* ── Split View ── */}
    <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>

      {/* Left: Scenarios */}
      <div style={{width:400,flexShrink:0,borderRight:"1px solid var(--border)",overflow:"auto",padding:"16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <SectionTitle>Scenarios</SectionTitle>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Btn label="All" color="var(--text3)" onClick={()=>setSelectedScenarios(new Set(scenarios.map(s=>s.id)))} small/>
            <Btn label="None" color="var(--text3)" onClick={()=>setSelectedScenarios(new Set())} small/>
            <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>{selectedScenarios.size}/{scenarios.length}</span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {scenarios.map(sc=>{
            const meta=SCENARIO_META[sc.id]||{icon:"\u{1F4E7}",color:"#999",indicators:[]};
            const expanded=expandedScenario===sc.id;
            const checked=selectedScenarios.has(sc.id);
            return <div key={sc.id}
              style={{background:meta.color+"0a",border:"1px solid "+meta.color+"25",borderRadius:6,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s"}}
              onClick={()=>setExpandedScenario(expanded?null:sc.id)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <label onClick={e=>e.stopPropagation()} style={{display:"flex",cursor:"pointer"}}>
                  <input type="checkbox" checked={checked} onChange={e=>{
                    const n=new Set(selectedScenarios);e.target.checked?n.add(sc.id):n.delete(sc.id);setSelectedScenarios(n);
                  }}/>
                </label>
                <span style={{fontSize:18}}>{meta.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,color:"#e8e8e8",fontSize:13}}>[{sc.id}] {sc.name}</span>
                  </div>
                  <div style={{display:"flex",gap:4,marginTop:3}}>
                    <Badge color={VERDICT_COLORS[sc.verdict]}>{sc.verdict}</Badge>
                    <Badge color="var(--text3)">{sc.difficulty}</Badge>
                  </div>
                </div>
              </div>
              {expanded&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+meta.color+"20"}}>
                <div style={{display:"grid",gridTemplateColumns:"70px 1fr",gap:"3px 8px",fontSize:11}}>
                  <span style={{color:"var(--text3)"}}>From:</span>
                  <span style={{color:"var(--text)"}}>{sc.from_name} &lt;{sc.from_address}&gt;</span>
                  <span style={{color:"var(--text3)"}}>Subject:</span>
                  <span style={{color:"var(--text)",wordBreak:"break-word"}}>{sc.subject}</span>
                  <span style={{color:"var(--text3)"}}>Indicators:</span>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                    {meta.indicators.map(i=><span key={i} style={{padding:"1px 6px",borderRadius:3,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",fontSize:10,color:"var(--text2)"}}>{i}</span>)}
                  </div>
                </div>
              </div>}
            </div>;
          })}
        </div>
      </div>

      {/* Right: Users */}
      <div style={{flex:1,overflow:"auto",padding:"16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <SectionTitle>Users</SectionTitle>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Btn label="All" color="var(--text3)" onClick={toggleAllUsers} small/>
            <Btn label="None" color="var(--text3)" onClick={()=>setSelectedUsers(new Set())} small/>
            <Btn label="\u21BB" color="var(--text3)" onClick={()=>connectAndLoad()} small/>
            <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>{selectedUsers.size}/{users.length}</span>
          </div>
        </div>

        <input value={userSearch} onChange={e=>setUserSearch(e.target.value)}
          placeholder="Search by name, email, or department..."
          style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)",padding:"8px 12px",fontSize:12,fontFamily:"var(--font-ui)",outline:"none",marginBottom:12}}/>

        {/* Loading state */}
        {connecting && users.length===0 && authStatus!=="fail" && (
          <div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>
            <div style={{marginBottom:8}}>Connecting to tenant...</div>
            <div style={{fontSize:11}}>Loading users</div>
          </div>
        )}

        {/* Auth failed */}
        {!connecting && authStatus==="fail" && (
          <div style={{padding:16,background:"rgba(255,71,87,0.06)",border:"1px solid #ff475730",borderRadius:6,textAlign:"center"}}>
            <div style={{color:"var(--red)",marginBottom:8}}>Authentication failed</div>
            <Btn label="Retry" color="var(--red)" onClick={connectAndLoad} small/>
          </div>
        )}

        {/* No users found */}
        {!connecting && authStatus==="ok" && users.length===0 && (
          <div style={{padding:16,background:"rgba(255,165,2,0.06)",border:"1px solid #ffa50230",borderRadius:6,textAlign:"center"}}>
            <div style={{color:"var(--orange)",marginBottom:8}}>Connected but no users found</div>
            <Btn label="Retry" color="var(--orange)" onClick={loadUsers} small/>
          </div>
        )}

        {/* User list */}
        {users.length>0 && (
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {filteredUsers().map(u=>{
              const k=u.mail||u.userPrincipalName;
              const sel=selectedUsers.has(k);
              return <div key={k}
                onClick={()=>{const n=new Set(selectedUsers);sel?n.delete(k):n.add(k);setSelectedUsers(n);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:6,cursor:"pointer",transition:"all 0.1s",
                  background:sel?"rgba(255,71,87,0.06)":"transparent",border:"1px solid "+(sel?"#ff475730":"transparent")}}>
                <input type="checkbox" checked={sel} readOnly style={{pointerEvents:"none"}}/>
                <div style={{width:28,height:28,borderRadius:"50%",background:sel?"var(--red)":"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:sel?"#fff":"var(--text3)",flexShrink:0}}>
                  {(u.displayName||"?")[0]}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,color:sel?"#e8e8e8":"var(--text)",fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.displayName}</div>
                  <div style={{fontSize:10,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.mail||u.userPrincipalName}</div>
                </div>
                {u.department&&<span style={{fontSize:10,color:"var(--text3)",padding:"2px 6px",background:"var(--bg)",borderRadius:3,whiteSpace:"nowrap",flexShrink:0}}>{u.department}</span>}
              </div>;
            })}
          </div>
        )}
      </div>
    </div>

    {/* ── Action Bar ── */}
    <div style={{flexShrink:0,borderTop:"1px solid var(--border)",padding:"10px 28px",display:"flex",gap:10,alignItems:"center",background:"var(--bg2)",flexWrap:"wrap"}}>
      <Btn label={`\u{1F489} Inject (${selectedScenarios.size * selectedUsers.size})`}
        color="var(--green)" onClick={runInject}
        disabled={running||!selectedUsers.size||!selectedScenarios.size}/>
      <Btn label={"\u{1F9F9} Clean"} color="var(--orange)" onClick={runClean}
        disabled={running||!selectedUsers.size}/>
      <Btn label={"\u{1F504} Reset"} color="var(--red)" onClick={runReset}
        disabled={running||!selectedUsers.size}/>
      <Btn label={"\u{1F4EC} Status"} color="var(--cyan)" onClick={runStatus}
        disabled={running||!selectedUsers.size}/>
      <div style={{flex:1}}/>
      <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>
        {selectedScenarios.size} scenarios &times; {selectedUsers.size} users
      </span>
    </div>

    {/* ── Collapsible Log/Status Panel ── */}
    <div style={{flexShrink:0,borderTop:"1px solid var(--border)",background:"#050810"}}>
      {/* Toggle bar */}
      <div onClick={()=>setLogOpen(!logOpen)}
        style={{padding:"8px 28px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none"}}>
        <span style={{color:"var(--text3)",fontSize:11,fontFamily:"var(--font-mono)"}}>
          {logOpen?"\u25B4":"\u25BE"}
        </span>
        <button onClick={e=>{e.stopPropagation();setBottomTab("log");setLogOpen(true);}}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:11,
            fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:1,
            color:bottomTab==="log"?"var(--red)":"var(--text3)",
            borderBottom:bottomTab==="log"?"1px solid var(--red)":"1px solid transparent",
            padding:"2px 0"}}>
          LOG {logs.length>0&&`(${logs.length})`}
        </button>
        <button onClick={e=>{e.stopPropagation();setBottomTab("status");setLogOpen(true);}}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:11,
            fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:1,
            color:bottomTab==="status"?"var(--cyan)":"var(--text3)",
            borderBottom:bottomTab==="status"?"1px solid var(--cyan)":"1px solid transparent",
            padding:"2px 0"}}>
          STATUS {statusData&&`(${Object.keys(statusData).length})`}
        </button>
        <div style={{flex:1}}/>
        {running&&<span style={{color:"var(--orange)",fontSize:11,fontFamily:"var(--font-mono)"}}>{"\u25CF"} RUNNING</span>}
        <Btn label="Clear" color="var(--text3)" onClick={e=>{
          e.stopPropagation();
          if(bottomTab==="log") setLogs([]);
          else setStatusData(null);
        }} small/>
      </div>

      {/* Expandable content */}
      {logOpen && (
        <div style={{maxHeight:250,overflow:"auto",padding:"0 28px 12px"}}>

          {/* Log view */}
          {bottomTab==="log" && (
            <div style={{fontFamily:"var(--font-mono)",fontSize:12}}>
              {logs.length===0 && <div style={{color:"var(--text3)",padding:16,textAlign:"center"}}>No operations yet</div>}
              {logs.map((l,i)=>(
                <div key={i} style={{padding:"2px 0",display:"flex",gap:8}}>
                  <span style={{color:"var(--text3)",minWidth:70}}>{l.ts}</span>
                  <span style={{color:l.type==="success"?"var(--green)":l.type==="error"?"var(--red)":"var(--blue)"}}>
                    {l.type==="success"?"[+]":l.type==="error"?"[-]":"[*]"}
                  </span>
                  <span style={{color:l.type==="error"?"#ff6b7a":"var(--text2)"}}>{l.msg}</span>
                </div>
              ))}
              <div ref={logEndRef}/>
            </div>
          )}

          {/* Status view */}
          {bottomTab==="status" && (
            <div>
              {!statusData ? (
                <div style={{color:"var(--text3)",padding:16,textAlign:"center",fontSize:12}}>Click "Status" to scan mailboxes</div>
              ) : Object.entries(statusData).map(([mail,found])=>(
                <div key={mail} style={{marginBottom:8}}>
                  <div style={{fontWeight:700,color:"#e8e8e8",fontSize:12,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
                    {"\u{1F4EC}"} {mail}
                    <Badge color={found.length>0?"var(--green)":"var(--text3)"}>{found.length} scenarios</Badge>
                  </div>
                  {found.length===0 && <div style={{color:"var(--text3)",fontSize:11,paddingLeft:24}}>No simulation emails found</div>}
                  {found.map(sc=>{
                    const meta=SCENARIO_META[sc.id]||{icon:"\u{1F4E7}"};
                    return <div key={sc.id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0 3px 24px",fontSize:11}}>
                      <span>{meta.icon}</span>
                      <span style={{color:"var(--text)",flex:1}}>{sc.name}</span>
                      <Badge color={VERDICT_COLORS[sc.verdict]}>{sc.verdict}</Badge>
                      {sc.read&&<Badge color="var(--text3)">READ</Badge>}
                      {sc.count>1&&<Badge color="var(--text3)">&times;{sc.count}</Badge>}
                    </div>;
                  })}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>

    {/* ── Settings Modal ── */}
    {showSettings && (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}
        onClick={()=>setShowSettings(false)}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:24,width:480,maxHeight:"80vh",overflow:"auto"}}
          onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <SectionTitle>Settings</SectionTitle>
            <button onClick={()=>setShowSettings(false)}
              style={{background:"none",border:"none",color:"var(--text3)",fontSize:18,cursor:"pointer"}}>{"\u2715"}</button>
          </div>
          <p style={{color:"var(--text2)",marginBottom:16,fontSize:12}}>
            Azure credentials are set via server environment variables. These settings control simulation domains and identities.
          </p>
          <CfgField label="API Key" value={apiKey} onChange={v=>setApiKey(v)} placeholder="Leave blank if not configured on server"/>
          <div style={{borderTop:"1px solid var(--border)",margin:"12px 0",paddingTop:12}}/>
          <CfgField label="Attacker Domain" value={config.attacker_domain||""} onChange={v=>setConfig(p=>({...p,attacker_domain:v}))} placeholder="m1crosoft-alerts.com"/>
          <CfgField label="BEC Domain" value={config.bec_domain||""} onChange={v=>setConfig(p=>({...p,bec_domain:v}))} placeholder="contoso-corp.com"/>
          <CfgField label="CEO Name" value={config.ceo_name||""} onChange={v=>setConfig(p=>({...p,ceo_name:v}))} placeholder="Michael Chen, CEO"/>
          <CfgField label="Company Name" value={config.company_name||""} onChange={v=>setConfig(p=>({...p,company_name:v}))} placeholder="Contoso"/>
          <CfgField label="Landing URL" value={config.landing_url||""} onChange={v=>setConfig(p=>({...p,landing_url:v}))} placeholder="https://m1crosoft-alerts.com/security/verify"/>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <Btn label="Save" color="var(--blue)" onClick={async()=>{
              try{localStorage.setItem("phishsim_api_key",apiKey);await api("/api/config",{method:"PUT",body:JSON.stringify(config)});log("success","Settings saved");setShowSettings(false);}catch(e){log("error","Save failed: "+e.message);}
            }}/>
            <Btn label="Cancel" color="var(--text3)" onClick={()=>setShowSettings(false)}/>
          </div>
          <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--border)",fontSize:11}}>
            <span style={{color:"var(--text3)"}}>Credentials: </span>
            {config.configured
              ? <span style={{color:"var(--green)"}}>Configured</span>
              : <span style={{color:"var(--red)"}}>Missing env vars</span>}
          </div>
        </div>
      </div>
    )}
  </div>;
}

function SectionTitle({children}){
  return <h2 style={{fontSize:13,color:"var(--red)",letterSpacing:2,margin:"0 0 0",fontWeight:800,fontFamily:"var(--font-mono)",textTransform:"uppercase"}}>{children}</h2>;
}

function Btn({label,color,onClick,disabled,small}){
  return <button onClick={onClick} disabled={disabled} style={{
    background:disabled?"#1a2230":color+"12",border:"1px solid "+(disabled?"var(--border)":color+"35"),
    color:disabled?"var(--text3)":color,padding:small?"6px 14px":"9px 20px",borderRadius:6,
    cursor:disabled?"not-allowed":"pointer",fontFamily:"var(--font-ui)",fontSize:small?11:12,fontWeight:700,transition:"all 0.15s"
  }}>{label}</button>;
}

function CfgField({label,value,onChange,placeholder}){
  return <div style={{display:"grid",gridTemplateColumns:"130px 1fr",gap:10,alignItems:"center",marginBottom:10}}>
    <label style={{color:"var(--text2)",fontSize:12}}>{label}</label>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:4,color:"var(--text)",padding:"8px 12px",fontFamily:"var(--font-ui)",fontSize:13,outline:"none"}}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
